# =============================================================================
# ai-review.yml — Claude AI Code Review (blocking)
#
# Runs on every PR opened or updated against main.
# Posts a structured review comment.
#
# Verdict logic:
#   "Review required" → job exits 1, merge is blocked
#   "Needs attention" → comment posted, merge allowed
#   "LGTM"           → comment posted, merge allowed
#
# Cost: ~4K tokens/review × claude-sonnet-4-6 ≈ $0.01–0.05/PR
# Setup: add ANTHROPIC_API_KEY as a repository Actions secret.
# =============================================================================

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/main...HEAD -- \
            '*.py' '*.ts' '*.tsx' '*.go' '*.java' '*.rs' \
            ':!**/node_modules/**' ':!**/vendor/**' ':!**/.git/**' \
            > /tmp/pr_diff.txt
          echo "lines=$(wc -l < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        if: steps.diff.outputs.lines > 0
        with:
          python-version: "3.11"

      - name: Run Claude review
        id: claude_review
        if: steps.diff.outputs.lines > 0
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          pip install anthropic --quiet
          python3 scripts/ai_review.py \
            --diff /tmp/pr_diff.txt \
            --output /tmp/review.md

      - name: Post review comment
        if: steps.diff.outputs.lines > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const blocked = '${{ steps.claude_review.outcome }}' === 'failure';
            const header = blocked
              ? '## 🤖 AI Code Review — ❌ Review Required (merge blocked)'
              : '## 🤖 AI Code Review';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${header}\n\n${review}\n\n---\n*Generated by Claude claude-sonnet-4-6*`
            });

      - name: Fail job if review required
        if: steps.claude_review.outcome == 'failure'
        run: |
          echo "AI review verdict: Review required — blocking merge" >&2
          exit 1
