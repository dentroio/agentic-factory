# =============================================================================
# ai-review.yml — Claude AI Code Review (blocking)
#
# Runs on every PR opened or updated against main.
# Posts a structured review comment.
#
# Verdict logic:
#   "Review required" → job exits 1, merge is blocked
#   "Needs attention" → comment posted, merge allowed (advisory only)
#   "LGTM"           → comment posted, merge allowed
#
# Token-saving rules (skip conditions — no API call):
#   - dependabot[bot] — no spend on dependency bumps
#   - HEAD commit contains [pr-watch-fix] — auto lint fix, already reviewed
#   - HEAD commit contains [ai-review-apply] — applier commit, loop guard
#   - HEAD commit contains [ci-autofix] — CI auto-fix, already addressed
#   Concurrency: cancel in-progress review when a new push arrives on the
#   same PR — avoids paying for a review that will be immediately superseded.
#
# Cost: ~7K tokens/review × claude-sonnet-4-6 ≈ $0.02–0.05/PR
# Setup: add ANTHROPIC_API_KEY as a repository Actions secret.
# =============================================================================

name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip auto-generated commits
        id: skip_check
        run: |
          msg=$(git log -1 --pretty=%B)
          first_line=$(echo "$msg" | head -1)
          if echo "$msg" | grep -qE '\[(pr-watch-fix|ai-review-apply|ci-autofix)\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping review — auto-generated commit: $first_line"
          elif echo "$first_line" | grep -qE "^Merge branch '.+' into .+$"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping review — GitHub 'Update branch' merge commit (PR code unchanged): $first_line"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get PR diff
        id: diff
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          git diff origin/main...HEAD -- \
            '*.py' '*.ts' '*.tsx' '*.go' '*.java' '*.rs' \
            ':!**/node_modules/**' ':!**/vendor/**' ':!**/.git/**' \
            > /tmp/pr_diff.txt
          echo "lines=$(wc -l < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        if: steps.skip_check.outputs.skip != 'true' && steps.diff.outputs.lines > 0
        with:
          python-version: "3.11"

      - name: Run Claude review
        id: claude_review
        if: steps.skip_check.outputs.skip != 'true' && steps.diff.outputs.lines > 0
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          pip install anthropic --quiet
          python3 scripts/ai_review.py \
            --diff /tmp/pr_diff.txt \
            --output /tmp/review.md

      - name: Post review comment
        if: steps.skip_check.outputs.skip != 'true' && steps.diff.outputs.lines > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const blocked = '${{ steps.claude_review.outcome }}' === 'failure';
            const header = blocked
              ? '## 🤖 AI Code Review — ❌ Review Required (merge blocked)'
              : '## 🤖 AI Code Review';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${header}\n\n${review}\n\n---\n*Generated by Claude claude-sonnet-4-6*`
            });

      - name: Fail job if review required
        if: steps.claude_review.outcome == 'failure'
        run: |
          echo "AI review verdict: Review required — blocking merge" >&2
          exit 1
