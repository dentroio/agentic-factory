name: Sync Wiki Pages to GitHub Wiki

# Mirrors docs/wiki/ to the GitHub Wiki tab.
# The GitHub Wiki is a separate git repo — it must be initialized first:
#   1. Go to Settings → Features → check "Wikis"
#   2. Click the Wiki tab → "Create the first page" → save anything
# After that, this workflow handles all future updates automatically.
#
# Uses GITHUB_TOKEN (automatic — no secrets needed) with contents:write.
# The sidebar (docs/wiki/_Sidebar.md) is copied as-is.
# Content pages (docs/wiki/*.md) are copied to the wiki repo root.

on:
  push:
    branches: [main]
    paths:
      - "docs/wiki/**"
  workflow_dispatch:

jobs:
  sync:
    name: Push to GitHub Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout factory repo
        uses: actions/checkout@v4

      - name: Clone GitHub Wiki repo
        run: |
          WIKI_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          if ! git clone "$WIKI_URL" wiki-repo 2>/dev/null; then
            echo "::error::Could not clone the wiki repo."
            echo "  Make sure the Wiki tab is enabled and initialized:"
            echo "  Settings → Features → Wikis → enable"
            echo "  Then visit the Wiki tab and click 'Create the first page'"
            exit 1
          fi

      - name: Copy wiki pages
        run: |
          cp docs/wiki/*.md wiki-repo/
          echo "Copied $(ls docs/wiki/*.md | wc -l | tr -d ' ') files"

      - name: Commit and push
        working-directory: wiki-repo
        run: |
          git config user.name  "wiki-sync[bot]"
          git config user.email "noreply@dentroio.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No wiki changes to push."
            exit 0
          fi

          CHANGED=$(git diff --cached --name-only | tr '\n' ' ')
          git commit -m "docs(wiki): sync ${CHANGED}[wiki-sync]

          Synced from docs/wiki/ in commit ${{ github.sha }}.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" HEAD:master
