# =============================================================================
# verifier.yml — Post-Merge AC Verification
#
# Runs after a PR is merged to main. Finds the WO spec linked in the PR title
# (WO-NNN pattern), extracts acceptance criteria, and verifies them against
# the merged diff.
#
# Posts a verification comment on the merged PR.
# Exits 1 (and creates a follow-up issue) if criteria are not met.
#
# Setup:
#   Add ANTHROPIC_API_KEY as a repository Actions secret.
# =============================================================================

name: Verifier — Post-Merge AC Check

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  verify-ac:
    name: Verify Acceptance Criteria
    runs-on: ubuntu-latest
    # Only run on merged PRs that reference a WO
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.title, 'WO-')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get merged diff
        run: |
          git diff ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.merge_commit_sha }} \
            '*.py' '*.ts' '*.tsx' '*.go' '*.java' '*.rs' \
            ':!**/node_modules/**' ':!**/vendor/**' \
            > /tmp/merged_diff.txt
          echo "Diff lines: $(wc -l < /tmp/merged_diff.txt)"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run verifier
        id: verify
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic --quiet
          python3 scripts/verifier_agent.py \
            --pr-title "${{ github.event.pull_request.title }}" \
            --diff /tmp/merged_diff.txt \
            --output /tmp/verification.md

      - name: Post verification comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report;
            try {
              report = fs.readFileSync('/tmp/verification.md', 'utf8');
            } catch {
              report = 'Verification report not generated.';
            }
            const failed = '${{ steps.verify.outcome }}' === 'failure';
            const header = failed
              ? '## 🔍 Post-Merge Verification — ❌ Criteria Not Met'
              : '## 🔍 Post-Merge Verification';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${header}\n\n${report}\n\n---\n*Generated by verifier agent*`
            });

      - name: Open follow-up issue if criteria not met
        if: steps.verify.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/verification.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Follow-up: unmet AC from ${{ github.event.pull_request.title }}`,
              body: `Merged PR #${{ github.event.pull_request.number }} did not fully satisfy its acceptance criteria.\n\n${report}\n\nLabel this issue \`new-wo\` to have the planning agent draft a follow-up WO.`,
              labels: ['bug', 'needs-triage'],
            });
