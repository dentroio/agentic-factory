services:
  factory-status:
    build:
      context: ./services/status-site
    ports:
      - "8099:8099"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - SITE_TITLE=${SITE_TITLE:-AI Factory}
      - REFRESH_SECONDS=${REFRESH_SECONDS:-60}
      - WO_PATH=${WO_PATH:-docs/project_management/work_orders}
      - RUNS_PATH=${RUNS_PATH:-docs/factory/runs}
      - PLAN_PATH=${PLAN_PATH:-docs/factory/PLAN.json}
      - ORCHESTRATOR_URL=http://orchestrator:8100
      - LOG_PATH=/var/log/factory-agent/out.log
      - LOCAL_REPO_MOUNT=/repos/primary
    volumes:
      - watchdog-data:/watchdog:ro
      - orchestrator-data:/orchestrator:ro
      - factory-config:/config
      - ${HOME}/Library/Logs/factory-agent:/var/log/factory-agent:ro
      - ${LOCAL_REPO_PATH}:/repos/primary
    restart: unless-stopped
    depends_on:
      - pr-watchdog
      - orchestrator

  pr-watchdog:
    build:
      context: ./services/pr-watchdog
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - POLL_INTERVAL=${POLL_INTERVAL:-300}
      - CI_FAIL_THRESHOLD=${CI_FAIL_THRESHOLD:-60}
      - CI_STUCK_THRESHOLD=${CI_STUCK_THRESHOLD:-45}
      - STALE_DAYS=${STALE_DAYS:-7}
      - ANCIENT_DAYS=${ANCIENT_DAYS:-14}
      - QUEUE_WARN_DEPTH=${QUEUE_WARN_DEPTH:-5}
      - POST_COMMENTS=${POST_COMMENTS:-false}
      - ORCHESTRATOR_URL=http://orchestrator:8100
      - MARK_DONE_ENABLED=${MARK_DONE_ENABLED:-false}
    volumes:
      - watchdog-data:/data
    restart: unless-stopped
    depends_on:
      - orchestrator

  agent-runner:
    build:
      context: ./services/agent-runner
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8100
      - PREFERRED_AGENT=${PREFERRED_AGENT:-claude}
      - AGENT_NAME=${AGENT_NAME:-claude-runner}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - CURSOR_API_KEY=${CURSOR_API_KEY:-}
      - POLL_INTERVAL=${POLL_INTERVAL:-60}
      - WORKTREE_BASE=/workspace
      - AGENT_TIMEOUT=${AGENT_TIMEOUT:-7200}
      - SECURITY_REVIEWER_BACKEND=${SECURITY_REVIEWER_BACKEND:-claude}
      - ARCH_REVIEWER_BACKEND=${ARCH_REVIEWER_BACKEND:-claude}
      - CORRECTNESS_REVIEWER_BACKEND=${CORRECTNESS_REVIEWER_BACKEND:-claude}
      - PERF_REVIEWER_BACKEND=${PERF_REVIEWER_BACKEND:-claude}
    volumes:
      - workspace:/workspace
    restart: unless-stopped
    depends_on:
      - orchestrator
    profiles:
      - agent   # opt-in: `docker compose --profile agent up -d`

  orchestrator:
    build:
      context: ./services/orchestrator
    ports:
      - "8100:8100"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - POLL_INTERVAL=${POLL_INTERVAL:-300}
      - MAX_PARALLEL_WOS=${MAX_PARALLEL_WOS:-2}
      - WO_PATH=${WO_PATH:-docs/project_management/work_orders}
      - RUNS_PATH=${RUNS_PATH:-docs/factory/runs}
      - PLAN_PATH=${PLAN_PATH:-docs/factory/PLAN.json}
      - DAILY_SUMMARY_HOUR=${DAILY_SUMMARY_HOUR:-}
      - SUMMARY_ISSUE_NUMBER=${SUMMARY_ISSUE_NUMBER:-}
      - SECONDARY_REPOS=${SECONDARY_REPOS:-}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - NTFY_SERVER=${NTFY_SERVER:-https://ntfy.sh}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - CODEX_WORKFLOW_FILE=${CODEX_WORKFLOW_FILE:-codex-dispatch.yml}
      - API_PORT=8100
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AGENT_RUNNER_URL=${AGENT_RUNNER_URL:-http://host.docker.internal:8101}
      - LOCAL_REPO_MOUNT=/repos/primary
    volumes:
      - orchestrator-data:/data
      - watchdog-data:/watchdog:ro
      - ${LOCAL_REPO_PATH}:/repos/primary
    restart: unless-stopped

volumes:
  watchdog-data:
  orchestrator-data:
  factory-config:
  workspace:
