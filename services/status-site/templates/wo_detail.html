{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="mb-5">
    <a href="/" class="inline-flex items-center gap-2 text-xs font-semibold text-slate-400 hover:text-slate-200 bg-slate-900 border border-slate-800 px-3.5 py-2 rounded-lg transition-all">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      <span>Back to Dashboard</span>
    </a>
  </div>
  <div class="glass-panel p-6 sm:p-8">
    <div class="flex flex-wrap items-center gap-2.5 mb-5 border-b border-slate-800/40 pb-4">
      <span class="text-[10px] font-bold font-mono px-2 py-0.5 rounded uppercase {{ spec.priority_class }}">
        {{ spec.priority }}
      </span>
      <span class="text-xs text-slate-400 font-mono">WO-{{ spec.number }}</span>
      <span class="text-slate-600 text-xs font-mono">|</span>
      <span class="text-[11px] font-bold font-display px-2.5 py-0.5 rounded-full uppercase tracking-wider bg-slate-800 text-slate-300">
        {{ spec.status }}
      </span>
      {% if spec.effort %}
      <span class="text-xs bg-slate-900 border border-slate-800 text-slate-400 rounded px-2.5 py-0.5 font-mono">{{ spec.effort }}</span>
      {% endif %}
    </div>
    
    <h1 class="text-xl sm:text-2xl font-display font-bold text-slate-100 mb-6">{{ spec.title }}</h1>
    
    <div class="overflow-hidden rounded-xl border border-slate-800/80">
      <div class="bg-slate-950 px-4 py-2 border-b border-slate-800/80 flex items-center justify-between">
        <span class="text-[10px] font-mono text-slate-500">spec_source.md</span>
        <span class="text-[10px] font-mono text-slate-500">RAW VIEW</span>
      </div>
      <pre class="whitespace-pre-wrap text-xs text-slate-300 font-mono bg-slate-950/70 p-5 overflow-auto max-h-[600px] leading-relaxed select-all">{{ spec.raw }}</pre>
    </div>
  </div>
</div>
{% endblock %}
