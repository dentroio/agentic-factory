{% extends "base.html" %}
{% block content %}
<div class="max-w-lg mx-auto mt-24 bg-white rounded-lg border border-red-200 p-8 text-center">
  <div class="text-4xl mb-4">⚠️</div>
  <h1 class="text-xl font-semibold text-red-700 mb-2">Configuration required</h1>
  <p class="text-gray-600 mb-6">{{ message }}</p>
  <div class="bg-gray-50 rounded p-4 text-left text-sm font-mono text-gray-700">
    <div>GITHUB_TOKEN=ghp_your_token_here</div>
    <div>GITHUB_REPO=owner/repo</div>
  </div>
  <p class="text-gray-500 text-sm mt-4">Set these environment variables and restart the container.</p>
</div>
{% endblock %}
